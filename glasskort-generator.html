<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glasskort · Sommarens Glassutmaning</title>
<style>
  :root{
    --rasp:#C9184A; --rasp-dk:#A4133C; --coral:#FF4D6D;
    --ink:#2B2026; --muted:#8A7E86; --line:#F0DDE3;
    --bg:#FFF1F4; --card:#FFFFFF; --field:#FFFFFF; --field-bd:#E7D6DC;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:22px 16px 64px}
  header.top{text-align:center;margin-bottom:18px}
  header.top h1{font-family:var(--serif);color:var(--rasp);font-size:30px;margin:0 0 4px;font-weight:700;letter-spacing:.2px}
  header.top p{margin:0;color:var(--muted);font-size:14.5px}
  .layout{display:grid;gap:18px}
  @media(min-width:880px){
    .layout{grid-template-columns:420px 1fr;align-items:start}
    .previewCol{position:sticky;top:16px}
  }
  /* preview */
  .previewCol{display:flex;flex-direction:column;gap:12px}
  .stage{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 26px rgba(164,19,60,.08)}
  .stage svg{width:100%;height:auto;display:block;border-radius:12px}
  .fmtbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .actions .btn{flex:1 1 auto}
  /* sections */
  section.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px;box-shadow:0 4px 16px rgba(164,19,60,.05)}
  section.panel + section.panel{margin-top:14px}
  .panel h2{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0 0 12px;font-weight:700}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:13px;font-weight:600;color:var(--ink)}
  .field .hint{font-size:12px;color:var(--muted);font-weight:400}
  input[type=text],input[type=number],textarea{
    width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--field);
    border:1.5px solid var(--field-bd);border-radius:10px;padding:10px 12px;outline:none;
  }
  textarea{resize:vertical;min-height:72px}
  input:focus-visible,textarea:focus-visible{border-color:var(--rasp);box-shadow:0 0 0 3px rgba(201,24,74,.14)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* chips */
  .chip{font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border-radius:999px;
    padding:8px 13px;border:1.5px solid var(--field-bd);background:#fff;color:var(--ink);transition:.15s}
  .chip:hover{border-color:var(--rasp)}
  .chip[aria-pressed=true]{background:var(--rasp);border-color:var(--rasp);color:#fff}
  .chip:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(201,24,74,.18)}
  /* swatches */
  .swatches{display:flex;flex-wrap:wrap;gap:10px}
  .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid #fff;
    box-shadow:0 0 0 1.5px var(--field-bd);transition:.12s}
  .sw[aria-pressed=true]{box-shadow:0 0 0 2.5px var(--ink)}
  .sw:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(201,24,74,.3)}
  /* rating */
  .rate{display:flex;align-items:center;gap:12px}
  .rate input[type=range]{flex:1;accent-color:var(--rasp)}
  .rateval{font-weight:700;min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
  .toggle{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;cursor:pointer;user-select:none}
  .toggle input{width:18px;height:18px;accent-color:var(--rasp)}
  /* buttons */
  .btn{font:inherit;font-size:15px;font-weight:700;cursor:pointer;border-radius:11px;padding:12px 16px;border:1.5px solid transparent;transition:.15s;text-align:center}
  .btn.primary{background:var(--rasp);color:#fff}
  .btn.primary:hover{background:var(--rasp-dk)}
  .btn.ghost{background:#fff;color:var(--rasp);border-color:var(--field-bd)}
  .btn.ghost:hover{border-color:var(--rasp)}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(201,24,74,.22)}
  /* result */
  #resultWrap{border:1px dashed var(--field-bd);border-radius:14px;padding:14px;text-align:center;background:#fff}
  #resultWrap img{max-width:100%;width:320px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.14)}
  #resultWrap .note{font-size:13px;color:var(--muted);margin-top:10px}
  .cap{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
  .cap textarea{flex:1 1 220px}
  .statusline{font-size:13px;color:var(--muted);min-height:18px;margin-top:6px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Glasskort</h1>
    <p>Gör ett delningsbart kort för varje glass &ndash; samma tema som bildspelet.</p>
  </header>

  <div class="layout">
    <!-- PREVIEW COLUMN -->
    <div class="previewCol">
      <div class="stage" id="stage" aria-label="Förhandsvisning av kortet"></div>
      <div class="fmtbar" role="group" aria-label="Format">
        <button class="chip" data-fmt="square" aria-pressed="true">Kvadrat 1:1</button>
        <button class="chip" data-fmt="portrait" aria-pressed="false">Porträtt 4:5</button>
        <button class="chip" data-fmt="story" aria-pressed="false">Story 9:16</button>
      </div>
      <div class="actions">
        <button class="btn primary" id="saveBtn">Spara bild (PNG)</button>
        <button class="btn ghost" id="capBtn">Föreslå bildtext</button>
      </div>
      <div class="statusline" id="status" role="status"></div>
      <div id="resultWrap" hidden>
        <img id="resultImg" alt="Färdigt glasskort">
        <div class="note">Klart! Klicka för att ladda ner, eller håll inne på bilden för att spara (mobil).</div>
      </div>
    </div>

    <!-- CONTROLS COLUMN -->
    <div class="controlsCol">
      <section class="panel">
        <h2>Välj glass</h2>
        <div class="row" id="presetRow"></div>
      </section>

      <section class="panel">
        <h2>Innehåll</h2>
        <div class="field">
          <label for="fName">Namn</label>
          <input type="text" id="fName" autocomplete="off">
        </div>
        <div class="field">
          <label for="fBrand">Märke <span class="hint">(tillverkare)</span></label>
          <input type="text" id="fBrand" autocomplete="off">
        </div>
        <div class="field">
          <label for="fNotes">Smaknoter <span class="hint">&ndash; separera med komma, max 5</span></label>
          <input type="text" id="fNotes" autocomplete="off" placeholder="t.ex. Vanilj, Jordgubb, Strössel">
        </div>
        <div class="field">
          <label for="fComment">Kommentar <span class="hint">(valfritt)</span></label>
          <input type="text" id="fComment" autocomplete="off" placeholder="En kort egen rad om glassen">
        </div>
      </section>

      <section class="panel">
        <h2>Betyg</h2>
        <label class="toggle" style="margin-bottom:12px">
          <input type="checkbox" id="fShowRating"> Visa betyg på kortet
        </label>
        <div class="rate">
          <input type="range" id="fRating" min="1" max="10" step="1" value="8" aria-label="Betyg 1 till 10">
          <span class="rateval" id="ratingVal">8 / 10</span>
        </div>
      </section>

      <section class="panel">
        <h2>Dag &amp; datum</h2>
        <div class="two">
          <div class="field">
            <label for="fDay">Dag <span class="hint">(av 29)</span></label>
            <input type="number" id="fDay" min="1" max="29" value="1">
          </div>
          <div class="field">
            <label for="fDate">Datum <span class="hint">(valfritt)</span></label>
            <input type="text" id="fDate" autocomplete="off" placeholder="t.ex. 12 juli">
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Illustration</h2>
        <div class="row" id="illRow"></div>
      </section>

      <section class="panel">
        <h2>Färgtema</h2>
        <div class="swatches" id="swatchRow"></div>
      </section>

      <section class="panel">
        <h2>Bildtext</h2>
        <div class="cap">
          <textarea id="fCaption" aria-label="Bildtext"></textarea>
        </div>
        <div style="margin-top:10px"><button class="btn ghost" id="copyCapBtn">Kopiera bildtext</button></div>
        <div class="statusline" id="capStatus" role="status"></div>
      </section>
    </div>
  </div>
</div>

<script>
"use strict";
const mctx = document.createElement('canvas').getContext('2d');
const SERIF = "Georgia, 'Times New Roman', serif";
const SANS  = "-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

function shade(hex, amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*(1-amt)); g=Math.round(g*(1-amt)); b=Math.round(b*(1-amt)); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function wrap(text, font, maxW){ mctx.font=font; const words=String(text).trim().split(/\s+/); const lines=[]; let line=''; for(const w of words){ const t=line?line+' '+w:w; if(mctx.measureText(t).width<=maxW||!line){ line=t; } else { lines.push(line); line=w; } } if(line) lines.push(line); return lines.length?lines:['']; }
function layoutPills(notes, font, maxW){ mctx.font=font; const padX=26, gapX=16; const items=notes.filter(Boolean).map(t=>({t,w:Math.ceil(mctx.measureText(t).width)+padX*2})); const rows=[]; let row=[], rw=0; for(const it of items){ const add=(row.length?gapX:0)+it.w; if(rw+add<=maxW||!row.length){ row.push(it); rw+=add; } else { rows.push({items:row,w:rw}); row=[it]; rw=it.w; } } if(row.length) rows.push({items:row,w:rw}); return rows; }

/* ---- illustrations (same artwork as the slide deck) ---- */
const stick=(x=134,w=32)=>`<rect x="${x}" y="298" width="${w}" height="82" rx="13" fill="#E3B173" stroke="#7C4A1E" stroke-width="6"/>`;
const ILLUS = {

  sittingbull:{vb:[300,380],svg:`<defs><clipPath id="cb"><rect x="70" y="52" width="160" height="266" rx="72"/></clipPath></defs>${stick()}<rect x="70" y="52" width="160" height="266" rx="72" fill="#FBE3C9" stroke="#C99A5B" stroke-width="8"/><g clip-path="url(#cb)"><path d="M70 150 q40 -30 80 0 q40 30 80 0 l0 36 q-40 30 -80 0 q-40 -30 -80 0 z" fill="#F4A6C0" opacity="0.85"/><ellipse cx="100" cy="120" rx="16" ry="40" fill="#FFFFFF" opacity="0.25"/><rect x="96" y="84" width="6" height="16" rx="3" transform="rotate(40 99 92)" fill="#E64A52"/><rect x="150" y="100" width="6" height="16" rx="3" transform="rotate(-20 153 108)" fill="#3FA0E0"/><rect x="186" y="150" width="6" height="16" rx="3" transform="rotate(70 189 158)" fill="#3FA34D"/><rect x="110" y="170" width="6" height="16" rx="3" transform="rotate(15 113 178)" fill="#F2C14E"/><rect x="150" y="210" width="6" height="16" rx="3" transform="rotate(-50 153 218)" fill="#9B5DE5"/><rect x="186" y="240" width="6" height="16" rx="3" transform="rotate(25 189 248)" fill="#F08A3C"/><rect x="104" y="246" width="6" height="16" rx="3" transform="rotate(60 107 254)" fill="#E64A52"/><rect x="150" y="276" width="6" height="16" rx="3" transform="rotate(-30 153 284)" fill="#3FA0E0"/><rect x="128" y="130" width="6" height="16" rx="3" transform="rotate(10 131 138)" fill="#F08A3C"/><rect x="170" y="190" width="6" height="16" rx="3" transform="rotate(80 173 198)" fill="#E64A52"/></g>`},

  sandwich:{vb:[340,260],svg:`<rect x="36" y="44" width="268" height="60" rx="16" fill="#4A2E1C" stroke="#2A170D" stroke-width="8"/><circle cx="78" cy="62" r="4" fill="#1F1009"/><circle cx="118" cy="62" r="4" fill="#1F1009"/><circle cx="158" cy="62" r="4" fill="#1F1009"/><circle cx="198" cy="62" r="4" fill="#1F1009"/><circle cx="238" cy="62" r="4" fill="#1F1009"/><circle cx="278" cy="62" r="4" fill="#1F1009"/><circle cx="78" cy="86" r="4" fill="#1F1009"/><circle cx="118" cy="86" r="4" fill="#1F1009"/><circle cx="158" cy="86" r="4" fill="#1F1009"/><circle cx="198" cy="86" r="4" fill="#1F1009"/><circle cx="238" cy="86" r="4" fill="#1F1009"/><circle cx="278" cy="86" r="4" fill="#1F1009"/><rect x="46" y="100" width="248" height="58" rx="8" fill="#FBF1D9" stroke="#D9C38A" stroke-width="7"/><rect x="36" y="154" width="268" height="60" rx="16" fill="#4A2E1C" stroke="#2A170D" stroke-width="8"/><circle cx="78" cy="172" r="4" fill="#1F1009"/><circle cx="118" cy="172" r="4" fill="#1F1009"/><circle cx="158" cy="172" r="4" fill="#1F1009"/><circle cx="198" cy="172" r="4" fill="#1F1009"/><circle cx="238" cy="172" r="4" fill="#1F1009"/><circle cx="278" cy="172" r="4" fill="#1F1009"/><circle cx="78" cy="196" r="4" fill="#1F1009"/><circle cx="118" cy="196" r="4" fill="#1F1009"/><circle cx="158" cy="196" r="4" fill="#1F1009"/><circle cx="198" cy="196" r="4" fill="#1F1009"/><circle cx="238" cy="196" r="4" fill="#1F1009"/><circle cx="278" cy="196" r="4" fill="#1F1009"/>`},
  pippi:{vb:[300,380],svg:`<defs><clipPath id="cp"><rect x="78" y="64" width="144" height="252" rx="66"/></clipPath></defs>${stick(138,24)}<rect x="78" y="64" width="144" height="252" rx="66" fill="#F0617E" stroke="#A8324A" stroke-width="9"/><g clip-path="url(#cp)"><rect x="78" y="64" width="144" height="46" fill="#F49A6A" opacity="0.9"/><ellipse cx="106" cy="130" rx="14" ry="36" fill="#FFFFFF" opacity="0.22"/><circle cx="110" cy="120" r="7" fill="#3FA0E0"/><circle cx="160" cy="110" r="7" fill="#F2C14E"/><circle cx="186" cy="150" r="7" fill="#3FA34D"/><circle cx="120" cy="165" r="7" fill="#9B5DE5"/><circle cx="165" cy="175" r="7" fill="#FFFFFF"/><circle cx="190" cy="205" r="7" fill="#F08A3C"/><circle cx="112" cy="215" r="7" fill="#F2C14E"/><circle cx="158" cy="225" r="7" fill="#3FA0E0"/><circle cx="186" cy="262" r="7" fill="#9B5DE5"/><circle cx="118" cy="262" r="7" fill="#3FA34D"/><circle cx="150" cy="285" r="7" fill="#F08A3C"/></g>`},
};
function genPopsicle(accent){ const dk=shade(accent,0.35); return {vb:[300,380],svg:`${stick()}<rect x="70" y="52" width="160" height="266" rx="72" fill="${accent}" stroke="${dk}" stroke-width="9"/><ellipse cx="100" cy="120" rx="16" ry="44" fill="#FFFFFF" opacity="0.22"/>`}; }
function genCone(accent){ const dk=shade(accent,0.35); return {vb:[300,380],svg:`<path d="M96 196 L150 344 L204 196 Z" fill="#E8BC72" stroke="#B07C3C" stroke-width="8" stroke-linejoin="round"/><g stroke="#B07C3C" stroke-width="4" opacity="0.7"><line x1="118" y1="212" x2="150" y2="300"/><line x1="150" y1="212" x2="150" y2="320"/><line x1="182" y1="212" x2="150" y2="300"/><line x1="110" y1="232" x2="190" y2="232"/><line x1="122" y1="268" x2="178" y2="268"/></g><circle cx="150" cy="150" r="74" fill="${accent}" stroke="${dk}" stroke-width="9"/><ellipse cx="126" cy="128" rx="20" ry="14" fill="#FFFFFF" opacity="0.25"/>`}; }
function genCup(accent){ const dk=shade(accent,0.35); return {vb:[300,380],svg:`<path d="M96 196 L120 332 L180 332 L204 196 Z" fill="#F1ECEF" stroke="#C9BFC6" stroke-width="8" stroke-linejoin="round"/><rect x="90" y="184" width="120" height="24" rx="12" fill="#E5DDE2" stroke="#C9BFC6" stroke-width="6"/><circle cx="150" cy="146" r="72" fill="${accent}" stroke="${dk}" stroke-width="9"/><path d="M118 150 q32 -28 64 0" stroke="${dk}" stroke-width="6" fill="none" opacity="0.45"/><ellipse cx="128" cy="126" rx="18" ry="12" fill="#FFFFFF" opacity="0.25"/>`}; }
function resolveIll(key, accent){ if(ILLUS[key]) return ILLUS[key]; if(key==='popsicle') return genPopsicle(accent); if(key==='cone') return genCone(accent); if(key==='cup') return genCup(accent); return ILLUS.magnum; }

/* ---- presets ---- */
const PRESETS = [
  {key:'magnum', label:'Magnum', name:'Magnum Crunchy Salted Caramel', brand:'Magnum · GB Glace', notes:['Salt kola','Mjölkchoklad','Knäckbitar','Krämig'], accent:'#9C5A1C', tint:'#F6EADB', ill:'magnum'},
  {key:'sittingbull', label:'Sitting Bull', name:'Sitting Bull', brand:'Triumf Glass', notes:['Vanilj','Jordgubb','Knaprigt strössel','Nostalgisk'], accent:'#D6336C', tint:'#FBE4ED', ill:'sittingbull'},
  {key:'vanilj', label:'Gammaldags Vanilj', name:'Gammaldags Vaniljglass', brand:'GB Gräddglass', notes:['Ren vanilj','Gräddig','Fyllig','Klassiker'], accent:'#B07A12', tint:'#FBF1D9', ill:'vanilj'},
  {key:'pirulo', label:'Pirulo Watermelon', name:'Pirulo Watermelon', brand:'Nestlé · Triumf Glass', notes:['Vattenmelon','Syrligt äpple','Chokladkärnor','Svalkande'], accent:'#1B9E54', tint:'#E4F5EA', ill:'pirulo'},
  {key:'sandwich', label:'Sandwich', name:'Sandwich', brand:'GB Glace', notes:['Ren vanilj','Mjuka chokladkex','Klassiker'], accent:'#6F4A2E', tint:'#EFE6DE', ill:'sandwich'},
  {key:'pippi', label:'Pippi Krumelur', name:'Pippi Krumelurglass', brand:'SIA Glass', notes:['Jordgubb','Hallon','Godisströssel','Lekfull'], accent:'#C9184A', tint:'#FDE2E7', ill:'pippi'},
  {key:'custom', label:'Egen glass', name:'Min glass', brand:'', notes:['Smak 1','Smak 2'], accent:'#C9184A', tint:'#FDE2E7', ill:'popsicle'},
];
const ILL_OPTIONS = [
  {key:'magnum',label:'Magnum-pinne'},{key:'sittingbull',label:'Strösselpinne'},{key:'vanilj',label:'Vaniljpaket'},
  {key:'pirulo',label:'Vattenmelon'},{key:'sandwich',label:'Sandwich'},{key:'pippi',label:'Pippi-pinne'},
  {key:'popsicle',label:'Pinnglass'},{key:'cone',label:'Strut'},{key:'cup',label:'Bägare'},
];
const THEMES = [
  {accent:'#C9184A', tint:'#FDE2E7'}, {accent:'#D6336C', tint:'#FBE4ED'}, {accent:'#9C5A1C', tint:'#F6EADB'},
  {accent:'#B07A12', tint:'#FBF1D9'}, {accent:'#1B9E54', tint:'#E4F5EA'}, {accent:'#6F4A2E', tint:'#EFE6DE'},
  {accent:'#3A5BA0', tint:'#E3E9F6'}, {accent:'#7A3FA0', tint:'#EFE3F6'},
];

/* ---- state ---- */
const S = { name:'', brand:'', notes:[], comment:'', accent:'#C9184A', tint:'#FDE2E7', ill:'magnum', rating:8, showRating:false, day:1, date:'', fmt:'square' };
let captionTouched = false;

/* ---- card builder (identical layout to the validated preview) ---- */
function buildCard(s, fmt){
  const DIMS={square:[1080,1080],portrait:[1080,1350],story:[1080,1920]}[fmt];
  const W=DIMS[0], H=DIMS[1], P=54, IP=64, cardX=P,cardY=P,cardW=W-2*P,cardH=H-2*P, CW=cardW-2*IP, cx=W/2;
  const G = fmt==='square'?24:fmt==='portrait'?30:36;
  const D = fmt==='square'?320:fmt==='portrait'?360:380;
  const accent=s.accent, tint=s.tint, dk=shade(accent,0.34);
  const ill=resolveIll(s.ill, accent); const vbW=ill.vb[0], vbH=ill.vb[1];
  const name = s.name || ' ';

  let ns, nameLines;
  for(const size of [66,58,50,44]){ const ls=wrap(name,`700 ${size}px ${SERIF}`,CW); if(ls.length<=3){ ns=size; nameLines=ls; break; } }
  if(!ns){ ns=44; nameLines=wrap(name,`700 44px ${SERIF}`,CW).slice(0,3); }
  const pillRows = s.notes.length? layoutPills(s.notes,`600 30px ${SANS}`,CW):[];
  const commentLines = s.comment? wrap(s.comment,`italic 30px ${SANS}`,CW).slice(0,2):[];

  const blocks=[];
  blocks.push({h:30,draw:y=>`<text x="${cx}" y="${y+24}" text-anchor="middle" font-family="${SANS}" font-size="24" font-weight="600" letter-spacing="4" fill="${accent}">SOMMARENS GLASSUTMANING</text>`});
  blocks.push({h:D,draw:y=>{ const r=D/2,ccx=cx,ccy=y+r,tmax=D*0.82,sc=tmax/Math.max(vbW,vbH),iw=vbW*sc,ih=vbH*sc,tx=ccx-iw/2,ty=ccy-ih/2; return `<circle cx="${ccx}" cy="${ccy}" r="${r}" fill="${tint}"/><g transform="translate(${tx.toFixed(1)} ${ty.toFixed(1)}) scale(${sc.toFixed(4)})">${ill.svg}</g>`; }});
  blocks.push({h:nameLines.length*ns*1.12,draw:y=>{ const lh=ns*1.12; return nameLines.map((ln,i)=>`<text x="${cx}" y="${(y+lh*i+ns*0.82).toFixed(1)}" text-anchor="middle" font-family="${SERIF}" font-size="${ns}" font-weight="700" fill="${accent}">${esc(ln)}</text>`).join(''); }});
  if(s.brand) blocks.push({h:32,draw:y=>`<text x="${cx}" y="${y+24}" text-anchor="middle" font-family="${SANS}" font-size="26" font-weight="700" letter-spacing="2" fill="#8A7E86">${esc(s.brand.toUpperCase())}</text>`});
  if(pillRows.length){ const rh=pillRows.length*52+(pillRows.length-1)*14; blocks.push({h:rh,draw:y=>{ let o='',ry=y; for(const row of pillRows){ let sx=cx-row.w/2; for(const it of row.items){ o+=`<rect x="${sx.toFixed(1)}" y="${ry}" width="${it.w}" height="52" rx="26" fill="${tint}"/><text x="${(sx+it.w/2).toFixed(1)}" y="${ry+36}" text-anchor="middle" font-family="${SANS}" font-size="30" font-weight="600" fill="${dk}">${esc(it.t)}</text>`; sx+=it.w+16; } ry+=66; } return o; }}); }
  if(s.showRating){ blocks.push({h:50,draw:y=>{ const filled=Math.round(s.rating/2); let st=''; for(let i=0;i<5;i++) st+= i<filled?'★':'☆'; const gap=18; mctx.font=`40px ${SANS}`; const sw=mctx.measureText(st).width; const num=`${s.rating} / 10`; mctx.font=`700 40px ${SANS}`; const nw=mctx.measureText(num).width; const tot=sw+gap+nw; let sx=cx-tot/2; const by=y+33; return `<text x="${sx.toFixed(1)}" y="${by}" text-anchor="start" font-family="${SANS}" font-size="40" fill="#F2B01E">${st}</text><text x="${(sx+sw+gap).toFixed(1)}" y="${by}" text-anchor="start" font-family="${SANS}" font-size="40" font-weight="700" fill="${accent}">${esc(num)}</text>`; }}); }
  if(commentLines.length){ blocks.push({h:commentLines.length*30*1.2,draw:y=>{ const lh=30*1.2; return commentLines.map((ln,i)=>`<text x="${cx}" y="${(y+lh*i+24).toFixed(1)}" text-anchor="middle" font-style="italic" font-family="${SANS}" font-size="30" fill="#5A525A">${esc(ln)}</text>`).join(''); }}); }
  blocks.push({h:54,draw:y=>{ const txt=`DAG ${s.day} / 29`+(s.date?`   ·   ${s.date.toUpperCase()}`:''); mctx.font=`700 28px ${SANS}`; const tw=mctx.measureText(txt).width; const pw=tw+56,px=cx-pw/2; return `<rect x="${px.toFixed(1)}" y="${y}" width="${pw.toFixed(1)}" height="54" rx="27" fill="${accent}"/><text x="${cx}" y="${y+37}" text-anchor="middle" font-family="${SANS}" font-size="28" font-weight="700" letter-spacing="1.5" fill="#FFFFFF">${esc(txt)}</text>`; }});

  const total=blocks.reduce((a,b)=>a+b.h,0)+G*(blocks.length-1);
  let y=cardY+Math.max(IP,(cardH-total)/2);
  let content=''; for(const b of blocks){ content+=b.draw(y); y+=b.h+G; }

  const defs=`<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A4133C"/><stop offset="0.5" stop-color="#C9184A"/><stop offset="1" stop-color="#FF4D6D"/></linearGradient><filter id="cs" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/></filter></defs>`;
  const bg=`<rect width="${W}" height="${H}" fill="url(#bg)"/><circle cx="${W-90}" cy="120" r="180" fill="#FFFFFF" opacity="0.07"/><circle cx="120" cy="${H-120}" r="150" fill="#FFFFFF" opacity="0.06"/>`;
  const card=`<rect x="${cardX}" y="${cardY}" width="${cardW}" height="${cardH}" rx="52" fill="#FFFFFF" filter="url(#cs)"/>`;
  return {svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${defs}${bg}${card}${content}</svg>`, W, H};
}

/* ---- render ---- */
const stage = document.getElementById('stage');
function render(){ const {svg}=buildCard(S, S.fmt); stage.innerHTML = svg; }

/* ---- caption ---- */
function suggestCaption(){
  const r = S.showRating ? ` Betyg: ${S.rating}/10.` : '';
  const n = S.notes.length ? ` ${S.notes.slice(0,2).join(' och ').toLowerCase()}.` : '';
  return `Dag ${S.day} av sommarens glassutmaning: ${S.name||'?'}.${n}${r} #glassutmaning #enomdagen`;
}
function refreshCaption(force){ if(captionTouched && !force) return; document.getElementById('fCaption').value = suggestCaption(); }

/* ---- build controls ---- */
const presetRow = document.getElementById('presetRow');
PRESETS.forEach(p=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=p.label; b.setAttribute('aria-pressed','false'); b.dataset.key=p.key; b.addEventListener('click',()=>loadPreset(p,b)); presetRow.appendChild(b); });

const illRow = document.getElementById('illRow');
ILL_OPTIONS.forEach(o=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=o.label; b.setAttribute('aria-pressed','false'); b.dataset.ill=o.key; b.addEventListener('click',()=>{ S.ill=o.key; markPressed(illRow,b); render(); }); illRow.appendChild(b); });

const swatchRow = document.getElementById('swatchRow');
THEMES.forEach(t=>{ const b=document.createElement('button'); b.className='sw'; b.style.background=t.accent; b.setAttribute('aria-pressed','false'); b.setAttribute('aria-label','Färgtema'); b.dataset.accent=t.accent; b.addEventListener('click',()=>{ S.accent=t.accent; S.tint=t.tint; markPressed(swatchRow,b); render(); }); swatchRow.appendChild(b); });

function markPressed(container, el){ [...container.children].forEach(c=>c.setAttribute('aria-pressed', c===el?'true':'false')); }

/* ---- inputs ---- */
const fName=document.getElementById('fName'), fBrand=document.getElementById('fBrand'), fNotes=document.getElementById('fNotes'),
      fComment=document.getElementById('fComment'), fShowRating=document.getElementById('fShowRating'), fRating=document.getElementById('fRating'),
      ratingVal=document.getElementById('ratingVal'), fDay=document.getElementById('fDay'), fDate=document.getElementById('fDate'),
      fCaption=document.getElementById('fCaption');

fName.addEventListener('input',()=>{ S.name=fName.value; render(); refreshCaption(); });
fBrand.addEventListener('input',()=>{ S.brand=fBrand.value; render(); });
fNotes.addEventListener('input',()=>{ S.notes=fNotes.value.split(',').map(x=>x.trim()).filter(Boolean).slice(0,5); render(); refreshCaption(); });
fComment.addEventListener('input',()=>{ S.comment=fComment.value; render(); });
fShowRating.addEventListener('change',()=>{ S.showRating=fShowRating.checked; render(); refreshCaption(); });
fRating.addEventListener('input',()=>{ S.rating=+fRating.value; ratingVal.textContent=`${S.rating} / 10`; render(); refreshCaption(); });
fDay.addEventListener('input',()=>{ S.day=Math.max(1,Math.min(29,+fDay.value||1)); render(); refreshCaption(); });
fDate.addEventListener('input',()=>{ S.date=fDate.value; render(); });
fCaption.addEventListener('input',()=>{ captionTouched=true; });

document.querySelectorAll('.fmtbar .chip').forEach(b=>{ b.addEventListener('click',()=>{ S.fmt=b.dataset.fmt; document.querySelectorAll('.fmtbar .chip').forEach(c=>c.setAttribute('aria-pressed', c===b?'true':'false')); render(); }); });

/* ---- load preset ---- */
function loadPreset(p, btn){
  S.name=p.name; S.brand=p.brand; S.notes=[...p.notes]; S.accent=p.accent; S.tint=p.tint; S.ill=p.ill; S.comment='';
  fName.value=p.name; fBrand.value=p.brand; fNotes.value=p.notes.join(', '); fComment.value='';
  markPressed(presetRow, btn);
  markPressed(illRow, [...illRow.children].find(c=>c.dataset.ill===p.ill) || illRow.children[0]);
  const sw=[...swatchRow.children].find(c=>c.dataset.accent.toLowerCase()===p.accent.toLowerCase());
  [...swatchRow.children].forEach(c=>c.setAttribute('aria-pressed','false')); if(sw) sw.setAttribute('aria-pressed','true');
  render(); refreshCaption(true); captionTouched=false;
}

/* ---- export ---- */
const statusEl=document.getElementById('status');
function status(m){ statusEl.textContent=m||''; }
function slug(t){ return (t||'glass').toLowerCase().replace(/[^a-z0-9åäö]+/g,'-').replace(/(^-|-$)/g,'').slice(0,40)||'glass'; }
document.getElementById('saveBtn').addEventListener('click',()=>{
  status('Skapar bild…');
  const {svg,W,H}=buildCard(S, S.fmt);
  const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{ try{
      const c=document.createElement('canvas'); c.width=W; c.height=H;
      const cc=c.getContext('2d'); cc.drawImage(img,0,0,W,H); URL.revokeObjectURL(url);
      c.toBlob(b=>{ if(!b){ status('Kunde inte skapa bilden.'); return; }
        const u=URL.createObjectURL(b);
        const out=document.getElementById('resultImg'); out.src=u; document.getElementById('resultWrap').hidden=false;
        try{ const a=document.createElement('a'); a.href=u; a.download=`glasskort-${slug(S.name)}-${S.fmt}.png`; document.body.appendChild(a); a.click(); a.remove(); }catch(e){}
        status('Klar – bilden visas nedanför.');
        document.getElementById('resultWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
      },'image/png');
    }catch(e){ status('Kunde inte skapa bilden: '+e.message); } };
  img.onerror=()=>{ status('Kunde inte rendera kortet.'); URL.revokeObjectURL(url); };
  img.src=url;
});

/* ---- caption buttons ---- */
document.getElementById('capBtn').addEventListener('click',()=>{ captionTouched=false; refreshCaption(true); document.getElementById('capStatus').textContent='Förslag uppdaterat.'; });
document.getElementById('copyCapBtn').addEventListener('click',async()=>{
  const t=fCaption.value; const st=document.getElementById('capStatus');
  try{ await navigator.clipboard.writeText(t); st.textContent='Bildtext kopierad.'; }
  catch(e){ fCaption.select(); try{ document.execCommand('copy'); st.textContent='Bildtext kopierad.'; }catch(_){ st.textContent='Kunde inte kopiera – markera och kopiera manuellt.'; } }
});

/* ---- init ---- */
loadPreset(PRESETS[0], presetRow.children[0]);
fShowRating.checked=false; fRating.value=8; ratingVal.textContent='8 / 10'; fDay.value=1;
render();
</script>
</body>
</html>
